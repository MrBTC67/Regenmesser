<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regen-Monitor Klaus Stabil Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --color-0: #00bcd4; --color-1: #ffeb3b; --color-2: #ff9800; 
            --color-3: #f44336; --color-4: #9c27b0; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 950px; margin: auto; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; margin-bottom: 20px; border-bottom: 5px solid var(--color-0); transition: border-color 0.8s; }
        .val { font-size: 3.5em; font-weight: bold; color: var(--color-0); transition: color 0.8s; }
        .chart-container { background: #1e1e1e; padding: 15px; border-radius: 12px; height: 450px; }
        .quick-select { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-quick { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9em; }
        .btn-quick.active { background: #00bcd4; color: #121212; font-weight: bold; border-color: #00bcd4; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 15px; background: #1e1e1e; padding: 15px; border-radius: 12px; }
        select { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="mainCard">
        <h3 id="displayTitle">Daten werden geladen...</h3>
        <div id="currRain" class="val">--</div>
    </div>

    <div class="quick-select">
        <button class="btn-quick" id="btn4h" onclick="setTimeframe('4h')">4 Std</button>
        <button class="btn-quick active" id="btnToday" onclick="setTimeframe('today')">Heute</button>
        <button class="btn-quick" id="btnWeek" onclick="setTimeframe('week')">7 Tage</button>
        <button class="btn-quick" id="btnMonth" onclick="setTimeframe('month')">Monat</button>
    </div>

    <div class="chart-container">
        <canvas id="rainChart"></canvas>
    </div>

    <div class="controls">
        <select id="yearSelect" onchange="updateData()"><option value="2026">2026</option></select>
        <select id="monthSelect" onchange="updateData()">
            <option value="Januar">Januar</option><option value="Februar">Februar</option>
            <option value="Maerz" selected>März</option><option value="April">April</option>
            <option value="Mai">Mai</option><option value="Juni">Juni</option>
            <option value="Juli">Juli</option><option value="August">August</option>
            <option value="September">September</option><option value="Oktober">Oktober</option>
            <option value="November">November</option><option value="Dezember">Dezember</option>
        </select>
    </div>
</div>

<script>
    const baseUrl = "https://wetterdaten-98f0f-default-rtdb.europe-west1.firebasedatabase.app/Regenmesser";
    const ctx = document.getElementById('rainChart').getContext('2d');
    let currentTimeframe = 'today';

    // Feinere Farblogik innerhalb des Starkregen-Bereichs (> 0,4l/min)
    function getColorByDiff(diff) {
        if (diff < 0.40) return '#00bcd4'; // Türkis
        if (diff < 0.45) return '#ffeb3b'; // Gelb
        if (diff < 0.55) return '#ff9800'; // Orange
        if (diff < 0.70) return '#f44336'; // Rot
        return '#9c27b0';                 // Violett
    }

    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ 
            label: 'l/m²', 
            data: [], 
            tension: 0.1, 
            pointRadius: 0,
            borderWidth: 3,
            segment: {
                borderColor: ctx => {
                    if (ctx.p0.parsed && ctx.p1.parsed) {
                        const diff = ctx.p1.parsed.y - ctx.p0.parsed.y;
                        return getColorByDiff(diff);
                    }
                    return '#00bcd4';
                }
            }
        }]},
        options: { 
            responsive: true, maintainAspectRatio: false, animation: false,
            scales: { 
                y: { beginAtZero: false, grid: { color: '#333' }, ticks: { color: '#888' } },
                x: { grid: { display: false }, ticks: { color: '#888', maxTicksLimit: 10 } }
            },
            plugins: { legend: { display: false } }
        }
    });

    async function updateData() {
        const year = document.getElementById('yearSelect').value;
        const month = document.getElementById('monthSelect').value;
        const now = new Date();
        let filterDate;
        let titleText = "";

        if (currentTimeframe === '4h') {
            filterDate = new Date(now.getTime() - (4 * 60 * 60 * 1000));
            titleText = "Niederschlag: Letzte 4 Stunden";
        } else if (currentTimeframe === 'week') {
            filterDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7);
            titleText = "Niederschlag: Letzte 7 Tage";
        } else if (currentTimeframe === 'month') {
            filterDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 31);
            titleText = `Niederschlag: Monat ${month}`;
        } else {
            filterDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            titleText = "Niederschlag: Heute";
        }

        try {
            const response = await fetch(`${baseUrl}/${year}/${month}.json?orderBy="$key"&limitToLast=10000`);
            const data = await response.json();
            if (!data) return;

            const labels = [];
            const values = [];
            const keys = Object.keys(data).sort();
            let lastVal = -1;
            let lastDiff = 0;

            keys.forEach(k => {
                const entry = data[k];
                const parts = entry.zeitstempel.split(/[. :]/);
                const entryDate = new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4]);

                if (entryDate >= filterDate) {
                    let h = (parseInt(parts[3]) + 1) % 24; 
                    labels.push(`${h.toString().padStart(2, '0')}:${parts[4]}`);
                    const val = parseFloat(entry.regen_l_m2) || 0;
                    values.push(val);
                    if (lastVal !== -1) lastDiff = val - lastVal;
                    lastVal = val;
                }
            });

            const totalVal = values[values.length - 1] || 0;
            document.getElementById('currRain').innerText = totalVal.toFixed(2) + " Liter/m²";
            
            const activeColor = getColorByDiff(lastDiff);
            document.getElementById('currRain').style.color = activeColor;
            document.getElementById('mainCard').style.borderColor = activeColor;

            chart.data.labels = labels;
            chart.data.datasets[0].data = values;
            chart.update();
            document.getElementById('displayTitle').innerText = titleText;
        } catch (e) { console.error(e); }
    }

    function setTimeframe(tf) {
        currentTimeframe = tf;
        document.querySelectorAll('.btn-quick').forEach(b => b.classList.remove('active'));
        let btnId = "btn" + (tf === '4h' ? '4h' : tf.charAt(0).toUpperCase() + tf.slice(1));
        document.getElementById(btnId).classList.add('active');
        updateData();
    }

    updateData();
    setInterval(updateData, 30000);
</script>
</body>
</html>
